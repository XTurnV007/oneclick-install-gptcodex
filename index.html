<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT 安装助手</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="app-window">
        <header class="titlebar" aria-label="窗口状态">
          <span class="traffic close"></span>
          <span class="traffic minimize"></span>
          <span class="traffic zoom"></span>
          <span class="titlebar-label">ChatGPT Installer</span>
        </header>

        <section class="hero">
          <div class="app-icon" aria-hidden="true">
            <span>●</span>
          </div>
          <div class="hero-copy">
            <p class="eyebrow">Windows 安装助手</p>
            <h1>安装 ChatGPT</h1>
            <p class="summary">自动选择可用方式获取安装包，并在准备完成后继续安装。</p>
          </div>
          <div class="status-pill" id="status-pill" data-mode="ready">
            <span class="pulse"></span>
            <span id="status-text">准备就绪</span>
          </div>
        </section>

        <section class="install-card">
          <div class="install-copy">
            <h2>一键完成安装</h2>
            <p>程序会先检查本地安装包；如果没有，会尝试系统安装通道，并在需要时打开 Microsoft Store 页面。</p>
          </div>
          <button class="primary" id="start-button" type="button">
            <span class="button-mark">▶</span>
            <span>安装 ChatGPT</span>
          </button>
        </section>

        <section class="progress-card" aria-label="安装进度">
          <div class="phase is-active" id="phase-prepare">
            <span class="phase-index">1</span>
            <div>
              <strong>准备</strong>
              <small>检查当前环境</small>
            </div>
          </div>
          <div class="phase" id="phase-acquire">
            <span class="phase-index">2</span>
            <div>
              <strong>获取</strong>
              <small>寻找或下载安装包</small>
            </div>
          </div>
          <div class="phase" id="phase-verify">
            <span class="phase-index">3</span>
            <div>
              <strong>验证</strong>
              <small>确认安装包状态</small>
            </div>
          </div>
          <div class="phase" id="phase-install">
            <span class="phase-index">4</span>
            <div>
              <strong>安装</strong>
              <small>启动安装程序</small>
            </div>
          </div>
        </section>

        <section class="log-panel">
          <div class="log-header">
            <h2>安装记录</h2>
            <span id="log-count">0 条</span>
          </div>
          <pre id="log"></pre>
        </section>
      </section>
    </main>
  </body>
</html>
